<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Mini Games Download</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, Pretendard, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #f8fafc;
        background: #0b1020;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 15% 20%, rgba(124, 58, 237, 0.38), transparent 34%),
          radial-gradient(circle at 80% 10%, rgba(251, 191, 36, 0.2), transparent 30%),
          linear-gradient(135deg, #0b1020, #111827 55%, #1f2937);
      }

      main {
        width: min(92vw, 760px);
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 28px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(18px);
      }

      .kicker {
        margin: 0 0 12px;
        color: #fbbf24;
        font-size: 0.85rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 8vw, 4.4rem);
        line-height: 1.05;
        letter-spacing: -0.06em;
      }

      .description {
        max-width: 620px;
        margin: 22px 0 0;
        color: #cbd5e1;
        font-size: clamp(1rem, 2.3vw, 1.2rem);
        line-height: 1.75;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 32px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 20px;
        border-radius: 999px;
        color: #111827;
        background: #fbbf24;
        font-weight: 800;
        text-decoration: none;
      }

      a.secondary {
        color: #f8fafc;
        background: rgba(255, 255, 255, 0.12);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
      }

      .note {
        margin: 22px 0 0;
        color: #94a3b8;
        font-size: 0.92rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">3D Mini Games</p>
      <h1>Windows 설치파일 다운로드</h1>
      <p class="description">
        장애물 달리기와 종이비행기 협곡을 포함한 Electron 기반 3D 미니게임 앱입니다.
        아래 버튼은 GitHub Releases에 등록된 최신 Windows 설치파일로 연결됩니다.
      </p>
      <div class="actions">
        <a id="download-link" href="#">최신 EXE 다운로드</a>
        <a id="release-link" class="secondary" href="#">릴리즈 페이지 보기</a>
      </div>
      <p class="note">
        다운로드 파일명: <strong>3D-Mini-Games-Setup.exe</strong><br />
        설치파일은 GitHub Actions에서 빌드되어 최신 Release asset으로 배포됩니다.
      </p>
    </main>

    <script>
      const hostParts = window.location.hostname.split(".");
      const owner = hostParts[0];
      const pathParts = window.location.pathname.split("/").filter(Boolean);
      const repo = pathParts[0] || "3d";
      const releaseBase = `https://github.com/${owner}/${repo}/releases/latest`;
      const downloadUrl = `${releaseBase}/download/3D-Mini-Games-Setup.exe`;

      document.getElementById("download-link").href = downloadUrl;
      document.getElementById("release-link").href = releaseBase;
    </script>
  </body>
</html>
