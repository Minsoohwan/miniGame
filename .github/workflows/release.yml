name: Build Windows Installer Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build Windows installer
        run: npm run build:exe

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3D-Mini-Games-Setup
          path: release/3D-Mini-Games-Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Windows Build {0}', github.run_number) }}
          files: release/3D-Mini-Games-Setup.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
